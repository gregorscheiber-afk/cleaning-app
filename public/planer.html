<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MYALPS · Belegungsplan</title>
<link rel="stylesheet" href="/style.css"/>
<style>
/* ── Planer Layout ── */
.planer-wrap {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  overflow: hidden;
}

.planer-toolbar {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.planer-toolbar label {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.planer-toolbar input[type="date"] {
  background: var(--surface-3);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--ink);
  padding: .35rem .6rem;
  font-size: .82rem;
}

.planer-toolbar select {
  background: var(--surface-3);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--ink);
  padding: .35rem .6rem;
  font-size: .82rem;
}

.btn-today {
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: var(--radius-sm);
  padding: .38rem .8rem;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .04em;
}

/* ── Planer Grid ── */
.planer-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

.planer-grid {
  display: grid;
  min-width: max-content;
}

/* Linke Spalte (Apartment-Namen) */
.col-apt {
  width: 140px;
  min-width: 140px;
  position: sticky;
  left: 0;
  z-index: 5;
  background: var(--surface);
  border-right: 2px solid var(--line);
}

/* Tag-Spalten */
.col-day {
  width: 38px;
  min-width: 38px;
  border-right: 1px solid var(--line);
}

/* Header-Zeilen */
.planer-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: contents;
}

.cell-header {
  background: var(--surface-2);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  padding: .35rem .2rem;
  white-space: nowrap;
  position: sticky;
  top: 0;
}

.cell-header.kw {
  background: var(--surface-3);
  color: var(--ink-soft);
  font-size: .6rem;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

.cell-header.day-name {
  font-size: .62rem;
  color: var(--ink-muted);
  border-bottom: 1px solid var(--line);
}

.cell-header.date-num {
  font-size: .75rem;
  font-weight: 700;
  color: var(--ink-soft);
  border-bottom: 2px solid var(--line);
}

.cell-header.is-today {
  background: var(--accent-dim);
  color: var(--accent);
}

.cell-header.is-weekend {
  background: rgba(255,255,255,.03);
}

/* Haus-Trennzeile */
.house-row {
  display: contents;
}

.cell-house-label {
  background: var(--surface-3);
  padding: .4rem .65rem;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  position: sticky;
  left: 0;
}

.cell-house-spacer {
  background: var(--surface-3);
  border-bottom: 1px solid var(--line);
}

/* Apartment-Zeile */
.apt-row {
  display: contents;
}

.cell-apt-name {
  padding: 0 .65rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-bottom: 1px solid var(--line);
  height: 44px;
  position: sticky;
  left: 0;
  background: var(--surface);
}

.cell-apt-name .apt-code {
  font-size: .78rem;
  font-weight: 700;
  color: var(--ink);
}

.cell-apt-name .apt-status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
  margin-right: .35rem;
}

.dot-belegt              { background: var(--belegt); }
.dot-muss_geputzt_werden { background: var(--putzen); }
.dot-sauber              { background: var(--sauber); }

/* Tages-Zellen */
.cell-day {
  border-bottom: 1px solid var(--line);
  border-right: 1px solid rgba(255,255,255,.03);
  height: 44px;
  position: relative;
  background: var(--bg);
}

.cell-day.is-today {
  background: rgba(200,150,58,.05);
}

.cell-day.is-weekend {
  background: rgba(255,255,255,.015);
}

.cell-day.checkout-day {
  background: rgba(217,107,60,.08);
}

/* Buchungs-Block */
.booking-block {
  position: absolute;
  top: 4px;
  bottom: 4px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 0 .5rem;
  overflow: hidden;
  cursor: default;
  z-index: 2;
  white-space: nowrap;
}

.booking-block .bk-guest {
  font-size: .72rem;
  font-weight: 600;
  color: #111;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.booking-block .bk-persons {
  font-size: .65rem;
  color: rgba(0,0,0,.6);
  margin-left: .35rem;
  flex-shrink: 0;
}

/* Buchungsfarben – nach Haus rotierend */
.bk-color-0 { background: #c8963a; }
.bk-color-1 { background: #4a8fd4; }
.bk-color-2 { background: #4caf7d; }
.bk-color-3 { background: #9b59b6; }
.bk-color-4 { background: #e67e22; }
.bk-color-5 { background: #1abc9c; }

/* Checkout-Markierung (linker Rand) */
.checkout-marker {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 3px;
  background: var(--putzen);
  z-index: 3;
}

/* Legende */
.planer-legend {
  display: flex;
  gap: 1rem;
  align-items: center;
  margin-left: auto;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: .35rem;
  font-size: .7rem;
  color: var(--ink-soft);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.planer-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--ink-muted);
  font-size: .9rem;
}
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar-logo" href="/">
    <svg class="logo-mark" viewBox="0 0 40 32" fill="none">
      <path d="M0 30 L8 14 L13 21 L20 6 L27 21 L32 14 L40 30 Z" fill="#c8963a"/>
    </svg>
    <div><span class="logo-name">MYALPS</span><span class="logo-sub">Homes · Ötztal</span></div>
  </a>
  <div class="topbar-right">
    <span class="page-role-badge">Belegungsplan</span>
  </div>
</header>

<div class="planer-wrap">
  <div class="planer-toolbar">
    <label>Von</label>
    <input type="date" id="from-date"/>
    <label>Tage</label>
    <select id="days-select">
      <option value="21">21 Tage</option>
      <option value="30" selected>30 Tage</option>
      <option value="45">45 Tage</option>
      <option value="60">60 Tage</option>
    </select>
    <button class="btn-today" id="btn-today">Heute</button>

    <div class="planer-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--putzen)"></div>Checkout</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--belegt)"></div>Belegt</div>
      <div class="legend-item"><div class="legend-dot dot-sauber"></div>Sauber/Frei</div>
    </div>
  </div>

  <div class="planer-scroll" id="planer-scroll">
    <div class="planer-empty" id="planer-loading">Wird geladen …</div>
  </div>
</div>

<script src="/i18n.js"></script>
<script src="/planer.js"></script>
</body>
</html>
