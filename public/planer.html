<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MYALPS · Belegungsplan</title>
<link rel="stylesheet" href="/style.css"/>
<style>
html, body { height: 100%; overflow: hidden; }

.planer-page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
}

/* ── Toolbar ── */
.planer-toolbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .55rem .9rem;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}

.planer-toolbar label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  white-space: nowrap;
}

.planer-toolbar input[type="date"],
.planer-toolbar select {
  background: var(--surface-3);
  border: 1px solid var(--line);
  border-radius: 7px;
  color: var(--ink);
  padding: .3rem .55rem;
  font-size: .8rem;
  outline: none;
}

.btn-today {
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 7px;
  padding: .32rem .75rem;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .03em;
}

.plan-title-badge {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border-radius: 999px;
  padding: .28rem .75rem;
  margin-left: auto;
}

/* ── Scroll container ── */
.planer-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* ── TABLE ── */
.planer-table {
  border-collapse: separate;
  border-spacing: 0;
  min-width: max-content;
  width: 100%;
  table-layout: fixed;
}

/* ── Sticky header cells ── */
.planer-table thead th {
  white-space: nowrap;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--ink-muted);
  text-align: center;
  padding: .3rem .1rem;
  position: sticky;
  z-index: 20;
  /* Solid background – verhindert Durchbluten beim Scrollen */
  background-color: #1e231e;
  border-bottom: 1px solid var(--line);
}

.row-kw  th { top: 0;    height: 26px; background-color: #222722; }
.row-day th { top: 26px; height: 24px; background-color: #1e231e; }
.row-date th { top: 50px; height: 26px; border-bottom: 2px solid var(--line); background-color: #1e231e; }

/* ── Heute in Header ── */
.row-kw th.is-today, .row-day th.is-today, .row-date th.is-today {
  background-color: rgba(200,150,58,.25) !important;
  color: var(--accent) !important;
  font-weight: 800 !important;
}
.row-kw th.is-weekend, .row-day th.is-weekend, .row-date th.is-weekend {
  background-color: #222722 !important;
}

/* ── Left name column ── */
.th-name, .td-name {
  position: sticky;
  left: 0;
  z-index: 10;
  background-color: #1a1e1a;
  width: 130px;
  min-width: 130px;
  max-width: 130px;
  border-right: 2px solid var(--line);
  padding: 0 .65rem;
}

/* Corner cell – höchster z-index damit Header + Left-Col sich nicht überlappen */
.planer-table thead .th-name {
  z-index: 40 !important;
  background-color: #222722 !important;
}

/* ── Today/Weekend in Body ── */
.is-today  { background-color: rgba(200,150,58,.06) !important; }
.is-weekend { background-color: rgba(255,255,255,.015) !important; }

/* ── House separator row ── */
.tr-house td {
  background: var(--surface-3);
  padding: .35rem .7rem;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--line);
  height: 28px;
}

.tr-house .td-name {
  background: var(--surface-3);
}

/* ── Apartment row ── */
.tr-apt .td-name {
  height: 44px;
  border-bottom: 1px solid var(--line);
  display: table-cell;
  vertical-align: middle;
}

.td-name-inner {
  display: flex;
  flex-direction: column;
  gap: .1rem;
}

.apt-code {
  font-size: .82rem;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.apt-time-label {
  font-size: .62rem;
  color: var(--ink-muted);
  white-space: nowrap;
}

/* ── Day cells ── */
.td-day {
  width: 36px;
  min-width: 36px;
  max-width: 36px;
  height: 44px;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid rgba(255,255,255,.04);
  background: var(--bg);
  position: relative;
  overflow: visible;
  padding: 0;
}

.td-day.is-today {
  background: rgba(200,150,58,.13) !important;
  border-left: 1px solid rgba(200,150,58,.4) !important;
  border-right: 1px solid rgba(200,150,58,.4) !important;
}
.td-day.is-weekend  { background: rgba(255,255,255,.015); }
.td-day.is-checkout { background: rgba(217,107,60,.06); }

/* ── Booking blocks dürfen nicht über Header ragen ── */
.planer-scroll {
  isolation: isolate;
}

/* ── Booking block ── */
.bk {
  position: absolute;
  top: 4px;
  bottom: 4px;
  left: 1px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 0 .45rem;
  overflow: hidden;
  white-space: nowrap;
  z-index: 3;
  cursor: default;
}

/* Überlappende Buchungen: obere/untere Hälfte der Zeile */
.bk.bk-upper { bottom: 50%; top: 3px; }
.bk.bk-lower { top: 50%; bottom: 3px; }
.bk.bk-upper .bk-guest, .bk.bk-lower .bk-guest { font-size: .6rem; }
.bk.bk-upper .bk-persons, .bk.bk-lower .bk-persons { font-size: .55rem; }

.bk-guest   { font-size: .7rem; font-weight: 600; color: #111; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.bk-persons { font-size: .63rem; color: rgba(0,0,0,.55); margin-left: .3rem; flex-shrink: 0; }

/* Zusatzleistungen (Frühstück/Zwischenreinigung) auf dem Buchungsbalken */
.bk-svc {
  font-size: .6rem;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,.55);
  border-radius: 4px;
  padding: 0 .25rem;
  margin-left: .25rem;
  flex-shrink: 0;
  line-height: 1.4;
}

/* Booking colors per house index */
.bk-0 { background: #c8963a; }
.bk-1 { background: #4a8fd4; }
.bk-2 { background: #4caf7d; }
.bk-3 { background: #9b59b6; }
.bk-4 { background: #e67e22; }
.bk-5 { background: #1abc9c; }
.bk-6 { background: #e74c3c; }
.bk-7 { background: #3498db; }

/* Checkout marker (colored left border on checkout day) */
.co-marker {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 3px;
  background: var(--putzen);
  z-index: 4;
}

/* Status dot */
.status-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: .3rem;
  flex-shrink: 0;
}
.dot-belegt              { background: var(--belegt); }
.dot-muss_geputzt_werden { background: var(--putzen); }
.dot-sauber              { background: var(--sauber); }

.planer-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
  color: var(--ink-muted);
}
</style>
</head>
<body>
<header class="topbar">
  <!-- Logo bewusst OHNE Link: aus dem Planer soll man nicht zur
       Reinigungs-Ansicht wechseln können -->
  <a class="topbar-logo">
    <svg class="logo-mark" viewBox="0 0 40 32" fill="none">
      <path d="M0 30 L8 14 L13 21 L20 6 L27 21 L32 14 L40 30 Z" fill="#c8963a"/>
    </svg>
    <div><span class="logo-name">MYALPS</span><span class="logo-sub">Apartments und Chalets</span></div>
  </a>
  <div class="topbar-right">
    <span class="page-role-badge" id="plan-badge">Belegungsplan</span>
  </div>
</header>

<div class="planer-page">
  <div class="planer-toolbar">
    <label>Von</label>
    <input type="date" id="from-date"/>
    <label>Tage</label>
    <select id="days-select">
      <option value="14">14 Tage</option>
      <option value="21">21 Tage</option>
      <option value="30" selected>30 Tage</option>
      <option value="45">45 Tage</option>
    </select>
    <button class="btn-today" id="btn-today">Heute</button>
    <select id="house-filter" style="display:none">
      <option value="">Alle Häuser</option>
    </select>
  </div>
  <div id="data-warning-container"></div>
  <div id="cleaning-alert-container"></div>
  <div class="planer-scroll" id="planer-scroll">
    <div class="planer-empty">Wird geladen …</div>
  </div>
</div>

<script src="/i18n.js"></script>
<script src="/datacheck.js"></script>
<script src="/planer.js"></script>
</body>
</html>
<style>
/* ── Notiz-Tooltip im Plan ── */
.bk-note-icon {
  flex-shrink: 0;
  font-size: .7rem;
  background: rgba(0,0,0,.25);
  border-radius: 50%;
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: .3rem;
  cursor: help;
  position: relative;
}

.bk-note-icon::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1e1a;
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: .55rem .75rem;
  font-size: .75rem;
  font-weight: 500;
  color: var(--ink);
  white-space: pre-line;
  min-width: 160px;
  max-width: 240px;
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
  line-height: 1.5;
}

.bk-note-icon::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--accent);
  z-index: 101;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
}

.bk-note-icon:hover::after,
.bk-note-icon:hover::before {
  opacity: 1;
}
</style>
<style>
/* Schwebender Notiz-Tooltip (an body gehängt, nicht abgeschnitten) */
.note-tooltip-float {
  position: fixed;
  transform: translate(-50%, -100%);
  background: #1a1e1a;
  border: 1px solid #c8963a;
  border-radius: 8px;
  padding: .55rem .75rem;
  font-size: .78rem;
  font-weight: 500;
  color: #e8e4dc;
  white-space: pre-line;
  min-width: 150px;
  max-width: 260px;
  box-shadow: 0 4px 16px rgba(0,0,0,.6);
  z-index: 9999;
  pointer-events: none;
  line-height: 1.5;
}
.bk-note-icon {
  flex-shrink: 0;
  font-size: .72rem;
  font-weight: 800;
  font-style: normal;
  font-family: Georgia, 'Times New Roman', serif;
  background: #fff;
  color: #c8963a;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-left: .3rem;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
</style>
