<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MYALPS · QR Codes</title>
<link rel="stylesheet" href="/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
.qr-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.25rem;
  margin-top: 1.5rem;
}

.qr-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

.qr-role {
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: .3rem .9rem;
  border-radius: 999px;
}

.qr-role.admin   { background: rgba(200,150,58,.15); color: var(--accent); }
.qr-role.planer  { background: rgba(74,143,212,.15); color: var(--belegt); }
.qr-role.cleaner { background: rgba(76,175,125,.15); color: var(--sauber); }

.qr-code-wrap {
  background: white;
  padding: 12px;
  border-radius: 10px;
}

.qr-url {
  font-size: .72rem;
  color: var(--ink-soft);
  word-break: break-all;
  text-align: center;
}

.qr-pin-hint {
  font-size: .75rem;
  color: var(--ink-muted);
  text-align: center;
}

.btn-print {
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: var(--radius-sm);
  padding: .6rem 1.2rem;
  font-weight: 700;
  font-size: .82rem;
  cursor: pointer;
  letter-spacing: .04em;
  margin-top: 1rem;
}

@media print {
  header, .btn-print { display: none !important; }
  .qr-grid { grid-template-columns: repeat(3,1fr); }
  body { background: white; }
  .qr-card { border: 1px solid #ccc; }
  .qr-role, .qr-url, .qr-pin-hint { color: #333 !important; }
}
</style>
</head>
<body>
<header class="topbar">
  <a class="topbar-logo" href="/admin.html">
    <svg class="logo-mark" viewBox="0 0 40 32" fill="none">
      <path d="M0 30 L8 14 L13 21 L20 6 L27 21 L32 14 L40 30 Z" fill="#c8963a"/>
    </svg>
    <div><span class="logo-name">MYALPS</span><span class="logo-sub">Apartments und Chalets</span></div>
  </a>
  <div class="topbar-right">
    <span class="page-role-badge">QR Codes</span>
    <a class="nav-pill" href="/admin.html">← Admin</a>
  </div>
</header>

<main style="max-width:900px;margin:0 auto;padding:1.5rem 1rem">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
    <div>
      <div style="font-size:1rem;font-weight:700;color:var(--ink)">QR Codes & Zugangsdaten</div>
      <div style="font-size:.8rem;color:var(--ink-soft);margin-top:.2rem">Für jeden Zugang einen QR Code scannen oder ausdrucken</div>
    </div>
    <button class="btn-print" onclick="window.print()">🖨 Drucken</button>
  </div>

  <div class="qr-grid" id="qr-grid"></div>
</main>

<script>
const BASE = window.location.origin;

const ROLES = [
  {
    id:    'admin',
    label: 'Admin',
    url:   `${BASE}/admin.html`,
    desc:  'Vollzugriff · Apartments, Import, Einstellungen',
    pin:   'PIN_ADMIN (in Railway gesetzt)',
  },
  {
    id:    'planer',
    label: 'Belegungsplan',
    url:   `${BASE}/planer.html`,
    desc:  'Buchungsübersicht · Gantt-Kalender',
    pin:   'PIN_PLANER (in Railway gesetzt)',
  },
  {
    id:    'cleaner',
    label: 'Reinigung',
    url:   `${BASE}/`,
    desc:  'Putzfrau-Zugang · Apartment-Status bestätigen',
    pin:   '',
  },
  {
    id:    'wiwa',
    label: 'Plan WIWA',
    url:   `${BASE}/planer.html`,
    desc:  'Belegungsplan · Alle Häuser',
    pin:   '',
  },
  {
    id:    'mainstreet',
    label: 'Plan MAINSTREET',
    url:   `${BASE}/planer.html?plan=mainstreet`,
    desc:  'Belegungsplan · Chalet White Pearl & Chalet Cecilia',
    pin:   '',
  },
];

const grid = document.getElementById('qr-grid');

ROLES.forEach(role => {
  const card = document.createElement('div');
  card.className = 'qr-card';
  card.innerHTML = `
    <div class="qr-role ${role.id}">${role.label}</div>
    <div class="qr-code-wrap" id="qr-${role.id}"></div>
    <div class="qr-url">${role.url}</div>
    <div class="qr-pin-hint">🔑 ${role.pin}</div>
    <div style="font-size:.72rem;color:var(--ink-muted);text-align:center">${role.desc}</div>`;
  grid.appendChild(card);

  new QRCode(document.getElementById(`qr-${role.id}`), {
    text:          role.url,
    width:         180,
    height:        180,
    colorDark:     '#000000',
    colorLight:    '#ffffff',
    correctLevel:  QRCode.CorrectLevel.M,
  });
});
</script>
</body>
</html>
