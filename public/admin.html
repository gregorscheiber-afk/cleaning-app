<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>MYALPS · Admin</title>
<link rel="stylesheet" href="/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<header class="topbar">
  <a class="topbar-logo" href="/">
    <svg class="logo-mark" viewBox="0 0 40 32" fill="none">
      <path d="M0 30 L8 14 L13 21 L20 6 L27 21 L32 14 L40 30 Z" fill="#c8963a"/>
    </svg>
    <div><span class="logo-name">MYALPS</span><span class="logo-sub">Apartments und Chalets</span></div>
  </a>
  <div class="topbar-right">
    <span class="page-role-badge" id="lbl-role"></span>
    <button class="nav-pill" id="btn-lang">🌐</button>
    <a class="nav-pill" href="/qrcodes.html">📲 QR</a>
    <div style="position:relative;display:inline-block" id="plan-menu-wrap">
      <button class="nav-pill" id="btn-plan-menu" style="cursor:pointer">📅 Plan ▾</button>
      <div id="plan-dropdown" style="display:none;position:absolute;right:0;top:110%;background:var(--surface);border:1px solid var(--line);border-radius:10px;min-width:170px;z-index:50;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4)">
        <a href="/planer.html" style="display:block;padding:.65rem 1rem;font-size:.82rem;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)">📅 Plan WIWA</a>
        <a href="/planer.html?plan=mainstreet" style="display:block;padding:.65rem 1rem;font-size:.82rem;color:var(--ink);text-decoration:none">📅 Plan MAINSTREET</a>
      </div>
    </div>
    <a class="nav-pill" href="/" id="lbl-clean"></a>
  </div>
</header>

<main>
  <!-- Daten-Warnung (Excel-Import-Selbstkontrolle) -->
  <div id="data-warning-container"></div>
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card c-putzen"><div class="stat-number" id="stat-putzen">–</div><div class="stat-label" id="lbl-stat-putzen"></div></div>
    <div class="stat-card c-sauber"><div class="stat-number" id="stat-sauber">–</div><div class="stat-label" id="lbl-stat-sauber"></div></div>
    <div class="stat-card c-belegt"><div class="stat-number" id="stat-belegt">–</div><div class="stat-label" id="lbl-stat-belegt"></div></div>
  </div>

  <svg class="mountain-divider" viewBox="0 0 680 32" preserveAspectRatio="none">
    <path d="M0 32 L60 8 L110 20 L180 2 L250 18 L320 5 L390 19 L460 7 L530 22 L600 4 L680 32 Z" fill="#c8963a"/>
  </svg>

  <!-- Benachrichtigungen -->
  <div class="panel">
    <div class="panel-header"><span class="panel-title" id="lbl-panel-notif"></span></div>
    <div class="panel-body"><div id="notifications" class="notif-list"></div></div>
  </div>

  <!-- Apartments -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="lbl-panel-apts"></span>
    </div>
    <div class="panel-body" style="padding:.75rem" id="apt-houses-container">
      <div style="color:var(--ink-muted);font-size:.85rem;padding:.5rem">Wird geladen…</div>
    </div>
  </div>


  <!-- Verwaltung Toggle -->
  <div style="padding:.5rem 0;text-align:center">
    <button id="btn-verwaltung-toggle" style="
      background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);
      color:var(--ink-soft);font-size:.8rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;padding:.6rem 1.5rem;cursor:pointer;
      transition:all .18s;display:inline-flex;align-items:center;gap:.5rem">
      ⚙ Verwaltung <span id="verwaltung-chevron" style="font-size:.65rem;transition:transform .2s">▼</span>
    </button>
  </div>

  <!-- Verwaltungs-Panels (versteckt) -->
  <div id="verwaltung-panels" style="display:none">

    <!-- Belegungsplan importieren (Excel) -->
    <div class="panel panel-mgmt">
      <div class="panel-header"><span class="panel-title" id="lbl-panel-import"></span></div>
      <div class="panel-body" style="padding:1.1rem">
        <div id="last-import-info" style="font-size:.78rem;color:var(--ink-soft);margin-bottom:.75rem;padding:.6rem .8rem;background:var(--surface-3);border-radius:8px;border:1px solid var(--line)">
          🔄 Letzter automatischer Import: <span id="last-import-time" style="color:var(--accent);font-weight:600">–</span>
        </div>
        <p class="import-hint" id="lbl-import-hint"></p>
        <div class="import-file-row">
          <label class="import-file-label" for="excel-file-input" id="lbl-import-btn"></label>
          <input type="file" id="excel-file-input" accept=".xlsx,.xls" style="display:none"/>
          <span class="import-filename" id="import-filename">–</span>
        </div>
        <div id="import-preview"></div>
        <button class="btn-primary" id="btn-import-start" style="display:none"></button>
        <div id="import-result"></div>
      </div>
    </div>

    <!-- Apartments verwalten (bearbeiten) -->
    <div class="panel panel-mgmt">
      <div class="panel-header"><span class="panel-title">Apartments bearbeiten</span></div>
      <div class="panel-body">
        <table class="apt-table">
          <thead><tr><th>Name</th><th>Haus</th><th>PMS-Code</th><th></th></tr></thead>
          <tbody id="manage-apt-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Häuser -->
    <div class="panel panel-mgmt">
      <div class="panel-header"><span class="panel-title" id="lbl-panel-houses"></span></div>
      <div class="panel-body">
        <table class="apt-table">
          <thead><tr><th id="th-name-h"></th><th>Apartments</th><th></th></tr></thead>
          <tbody id="houses-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Häuser & Apartments importieren -->
    <div class="panel panel-mgmt">
      <div class="panel-header"><span class="panel-title" id="lbl-panel-import-structure"></span></div>
      <div class="panel-body" style="padding:1.1rem">
        <p class="import-hint" id="lbl-import-structure-hint"></p>
        <div style="display:flex;gap:.6rem;margin-bottom:.75rem;flex-wrap:wrap">
          <button class="btn-secondary" id="btn-download-template" style="font-size:.8rem"></button>
          <label class="import-file-label" for="structure-file-input" id="lbl-structure-btn"></label>
          <input type="file" id="structure-file-input" accept=".xlsx,.xls" style="display:none"/>
          <span class="import-filename" id="structure-filename">–</span>
        </div>
        <div id="structure-preview"></div>
        <button class="btn-primary" id="btn-structure-start" style="display:none"></button>
        <div id="structure-result"></div>
      </div>
    </div>

    <!-- Haus hinzufügen -->
    <div class="panel panel-mgmt">
      <div class="panel-header"><span class="panel-title" id="lbl-panel-add-house"></span></div>
      <div class="panel-body">
        <form id="add-house-form" class="add-form">
          <input id="house-name" type="text" required/>
          <button type="submit" class="btn-primary" id="btn-add-house"></button>
          <div class="form-error" id="house-form-error"></div>
        </form>
      </div>
    </div>

    <!-- Apartment hinzufügen -->
    <div class="panel panel-mgmt">
      <div class="panel-header"><span class="panel-title" id="lbl-panel-add-apt"></span></div>
      <div class="panel-body">
        <form id="add-apt-form" class="add-form">
          <input id="apt-name" type="text" required/>
          <input id="apt-pms" type="text"/>
          <select id="apt-house" style="background:var(--surface-3);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:.65rem .8rem;font-size:.9rem;width:100%;"></select>
          <button type="submit" class="btn-primary" id="btn-add-apt"></button>
          <div class="form-error" id="apt-form-error"></div>
        </form>
      </div>
    </div>

  </div><!-- /verwaltung-panels -->
</main>

  <!-- Reinigungslog -->
  <div class="panel panel-mgmt">
    <div class="panel-header">
      <span class="panel-title">📊 Reinigungslog</span>
      <button class="btn-sync" id="btn-reset-log" style="color:var(--putzen)">Auf 0 setzen</button>
    </div>
    <div class="panel-body" style="padding:1.1rem" id="cleaning-log-body">
      <div style="color:var(--ink-muted);font-size:.82rem">Wird geladen…</div>
    </div>
  </div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-form">
      <div class="modal-field">
        <div class="modal-field-label" id="modal-lbl-name"></div>
        <input id="modal-apt-name" type="text"/>
      </div>
      <div class="modal-field">
        <div class="modal-field-label" id="modal-lbl-pms"></div>
        <input id="modal-apt-pms" type="text"/>
      </div>
      <div class="modal-field">
        <div class="modal-field-label" id="modal-lbl-time"></div>
        <input id="modal-apt-time" type="time" step="300"/>
      </div>
      <div class="modal-field">
        <div class="modal-field-label" id="modal-lbl-house"></div>
        <select id="modal-apt-house" style="background:var(--surface-3);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:.65rem .8rem;font-size:.9rem;width:100%;"></select>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel"></button>
        <button class="btn-primary" id="modal-save"></button>
      </div>
      <div class="form-error" id="modal-error"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/i18n.js"></script>
<script src="/auth.js"></script>
<script src="/datacheck.js"></script>
<script src="/admin.js"></script>
</body>
</html>
